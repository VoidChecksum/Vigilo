name: Bug Report
description: Report a bug or unexpected behavior in Vigilo
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Please write your issue in English.**

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using the latest version of Vigilo
          required: true
        - label: I have read the [documentation](https://github.com/PurpleAILAB/Vigilo#readme)
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug in detail...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure Vigilo with...
        2. Run command '...'
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor Output
      description: |
        Run `bunx vigilo doctor` and paste the full output below.
        This helps us diagnose your environment and configuration.
      placeholder: |
        Paste the output of: bunx vigilo doctor
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: If applicable, add any error messages or logs
      placeholder: Paste error logs here...
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: If relevant, share your Vigilo configuration (remove sensitive data)
      placeholder: |
        {
          "disabled_skills": [],
          "disabled_agents": []
        }
      render: json

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem
      placeholder: Add any other context, screenshots, or information...

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using Vigilo on?
      options:
        - OpenCode
        - Claude Code
    validations:
      required: true

  - type: input
    id: vigilo-version
    attributes:
      label: Vigilo Version
      description: Run `bunx vigilo --version` to get your version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which operating system are you using?
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
