name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      opencode: ${{ steps.filter.outputs.opencode }}
      bench: ${{ steps.filter.outputs.bench }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            opencode:
              - 'packages/opencode/**'
              - '.github/workflows/ci.yml'
            bench:
              - 'packages/bench/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - '**/*.md'

  typecheck-opencode:
    needs: changes
    if: needs.changes.outputs.opencode == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/opencode
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Type check opencode
        run: bun run typecheck
        working-directory: packages/opencode

  typecheck-bench:
    needs: changes
    if: needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/bench

      - name: Type check bench
        run: bun run typecheck
        working-directory: packages/bench

  test-opencode:
    needs: changes
    if: needs.changes.outputs.opencode == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/opencode
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Test opencode (with coverage gate)
        run: bun test --coverage
        working-directory: packages/opencode

  test-bench:
    needs: changes
    if: needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/bench

      - name: Test bench (with coverage gate)
        run: bun test --coverage
        working-directory: packages/bench

  lint-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Lint SKILL.md frontmatter
        run: bun run script/lint-skills.ts
        working-directory: packages/opencode

  consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: License consistency (root LICENSE + every package.json must be MIT)
        run: |
          fail=0
          head -1 LICENSE | grep -q "MIT License" || { echo "::error::root LICENSE is not MIT"; fail=1; }
          while IFS= read -r f; do
            lic=$(jq -r '.license // empty' "$f")
            if [ -n "$lic" ] && [ "$lic" != "MIT" ]; then
              echo "::error file=$f::license is '$lic' (expected MIT)"; fail=1
            fi
          done < <(git ls-files '*package.json' ':!:**/node_modules/**')
          exit $fail

      - name: Claude Code marketplace manifest resolves
        run: |
          test -f .claude-plugin/marketplace.json || { echo "::error::missing root .claude-plugin/marketplace.json"; exit 1; }
          jq -e '.name and (.plugins | length > 0) and .plugins[0].source' .claude-plugin/marketplace.json > /dev/null

  ci-ok:
    if: always()
    needs:
      - changes
      - typecheck-opencode
      - typecheck-bench
      - test-opencode
      - test-bench
      - lint-skills
      - consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all required jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")' > /dev/null
